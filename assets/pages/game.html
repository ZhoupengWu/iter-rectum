<!doctype html>
<html lang="en">
<head>
    <title>Iter Rectum - Gameplay</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- My CSS -->
    <link rel="stylesheet" href="../styles/game.css">
</head>
<body>
    <header>
        <a href="../../index.html" class="nav-logo">IR</a>
        <nav>
            <a href="../../index.html">Home</a>
            <a href="#">Tutorial</a>
            <a href="./list_game.html" class="active">Giochi</a>
            <a href="#">Classifica</a>
        </nav>
    </header>

    <main class="game-page-content">
        <div class="text-center">
            <h1 id="title-game" class="page-title">ITER RECTUM</h1>
        </div>

        <div id="game-wrapper">
            <div id="score-container">
                <div id="score-value">0</div>
            </div>
            <div id="game">
                <canvas id="road"></canvas>
            </div>
        </div>

        <div id="mobile-controls" class="mobile-controls">
            <button id="btn-up" class="btn-control">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M8 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L7.5 2.707V14.5a.5.5 0 0 0 .5.5z"/>
                </svg>
            </button>
            <button id="btn-down" class="btn-control">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M8 1a.5.5 0 0 1 .5.5v11.793l3.146-3.147a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 .708-.708L7.5 13.293V1.5A.5.5 0 0 1 8 1z"/>
                </svg>
            </button>
        </div>
    </main>

    <script type="module" src="../js/game.js"></script>
</body>
</html>
